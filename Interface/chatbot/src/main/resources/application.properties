spring.application.name=chatbot
# Cấu hình H2 Database
spring.datasource.url=jdbc:h2:mem:dinhduongdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Tự động tạo bảng từ Entity
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Port chạy server
server.port=8081

# JWT secret (ít nhất 32 ký tự cho HS256)
jwt.secret=chatbot-jwt-secret-key-please-change-this-for-production-2026

# Python RAG integration
rag.pythonExecutable=D:/anaconda/envs/nutrition-rag/python.exe
rag.cliScript=d:/FoodRecomendationSystem/main/rag_cli.py
rag.timeoutMs=240000